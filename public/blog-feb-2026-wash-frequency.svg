<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1a1a"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c9a96e"/>
      <stop offset="100%" style="stop-color:#e8d5a3"/>
    </linearGradient>
    <radialGradient id="glow2" cx="72%" cy="45%" r="45%">
      <stop offset="0%" style="stop-color:#1a4a6b;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#1a4a6b;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="waterdrop" cx="40%" cy="30%" r="60%">
      <stop offset="0%" style="stop-color:#4a9aba"/>
      <stop offset="100%" style="stop-color:#1a5a7a"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg2)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Water drop illustration (right side) -->
  <!-- Large drop -->
  <path d="M 875 100 Q 875 100 950 230 Q 1000 315 950 390 Q 900 460 875 460 Q 850 460 800 390 Q 750 315 800 230 Q 875 100 875 100 Z"
