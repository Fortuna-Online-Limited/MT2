  <path d="M 875 120 Q 875 120 940 238 Q 985 315 940 382 Q 896 445 875 445 Q 854 445 810 382 Q 765 315 810 238 Q 875 120 875 120 Z"
        fill="none" stroke="#4a9aba" stroke-width="1.5" opacity="0.5"/>
  <!-- Inner drop sheen -->
  <path d="M 855 160 Q 840 200 845 240" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.2" stroke-linecap="round"/>

  <!-- Smaller drops orbiting -->
  <path d="M 1020 200 Q 1020 200 1045 240 Q 1058 265 1045 285 Q 1032 305 1020 305 Q 1008 305 995 285 Q 982 265 995 240 Q 1020 200 1020 200 Z"
